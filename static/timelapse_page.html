<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timelapse Setup – PiCamera Suite</title>
  <style>
    :root { --bg:#121212; --card:#1e1e1e; --accent:#0066ff; --glow:#00aaff33; --text:#e0e0e0; --muted:#888; --green:#28a745; --red:#dc3545; --warn:#ffc107; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem;display:flex;align-items:center;justify-content:center;}
    .card{max-width:480px;width:100%;background:var(--card);border-radius:16px;padding:2rem;box-shadow:0 12px 40px var(--glow);}
    h1{font-size:1.8rem;font-weight:700;margin-bottom:.3rem;text-align:center;}
    .sub{color:var(--muted);text-align:center;margin-bottom:1.8rem;font-size:.9rem;}
    label{display:block;font-size:.85rem;color:var(--muted);margin-bottom:.3rem;margin-top:1rem;}
    input,select{width:100%;padding:.7rem .9rem;background:#2a2a2a;border:1px solid #333;border-radius:8px;color:var(--text);font-size:1rem;}
    input:focus,select:focus{outline:none;border-color:var(--accent);}
    .btn{display:block;width:100%;padding:.9rem;border:none;border-radius:8px;font-size:1rem;font-weight:600;cursor:pointer;margin-top:1.2rem;transition:filter .15s;}
    .btn:hover{filter:brightness(1.15);}
    .btn-start{background:var(--green);color:#fff;}
    .btn-stop{background:var(--red);color:#fff;}
    .status-box{margin-top:1.5rem;padding:1rem;background:#2a2a2a;border-radius:10px;}
    .status-label{font-size:.8rem;color:var(--muted);margin-bottom:.4rem;}
    .status-text{font-size:1rem;font-weight:600;}
    .status-text.capturing{color:var(--warn);}
    .status-text.building{color:var(--accent);}
    .status-text.done{color:var(--green);}
    .status-text.error{color:var(--red);}
    .progress-wrap{margin-top:.8rem;background:#1a1a1a;border-radius:6px;height:8px;overflow:hidden;}
    .progress-bar{height:100%;background:var(--accent);border-radius:6px;width:0%;transition:width .5s;}
    .progress-bar.pulse{animation:pulse 1.5s ease-in-out infinite;}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
    .detail{margin-top:.6rem;font-size:.82rem;color:var(--muted);}
    .video-link{display:block;margin-top:1rem;padding:.8rem;background:var(--accent);color:#fff;border-radius:8px;text-align:center;text-decoration:none;font-weight:600;}
    .video-link:hover{filter:brightness(1.15);}
    .back{display:inline-block;margin-top:1.5rem;color:var(--muted);text-decoration:none;font-size:.9rem;}
    .back:hover{color:var(--text);}
    .hidden{display:none;}
  </style>
</head>
<body>
<div class="card">
  <h1>Timelapse Setup</h1>
  <p class="sub">Configure and start a timelapse capture run</p>

  <div id="setup-form">
    <label>Capture interval (seconds)</label>
    <input id="interval" type="number" min="1" step="1" value="5">

    <label>Duration (minutes)</label>
    <input id="duration" type="number" min="1" step="1" value="10">

    <label>Output video framerate</label>
    <select id="fps">
      <option value="10" selected>10 fps</option>
      <option value="15">15 fps</option>
      <option value="24">24 fps</option>
      <option value="30">30 fps</option>
    </select>

    <button class="btn btn-start" id="btn-start" onclick="startCapture()">Start Capture</button>
  </div>

  <div class="status-box">
    <div class="status-label">STATUS</div>
    <div class="status-text" id="status-text">Idle</div>
    <div class="progress-wrap hidden" id="progress-wrap">
      <div class="progress-bar" id="progress-bar"></div>
    </div>
    <div class="detail hidden" id="detail"></div>
    <button class="btn btn-stop hidden" id="btn-stop" onclick="stopCapture()">Stop</button>
    <a class="video-link hidden" id="video-link" href="/video_page">Watch Video</a>
  </div>

  <a class="back" href="/">&larr; Back</a>
</div>

<script>
  let pollTimer = null;

  function startCapture() {
    const interval = parseFloat(document.getElementById('interval').value);
    const duration = parseFloat(document.getElementById('duration').value);
    const fps      = parseInt(document.getElementById('fps').value);
    if (!interval || !duration || interval <= 0 || duration <= 0) {
      alert('Please enter valid interval and duration.');
      return;
    }
    fetch('/timelapse/start', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({interval, duration, fps}),
    })
    .then(r => r.json())
    .then(d => {
      if (!d.ok) { alert('Error: ' + d.error); return; }
      startPolling();
    });
  }

  function stopCapture() {
    fetch('/timelapse/stop', {method: 'POST'});
  }

  function startPolling() {
    if (pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(pollStatus, 2000);
    pollStatus();
  }

  function pollStatus() {
    fetch('/timelapse/status')
      .then(r => r.json())
      .then(render);
  }

  function render(s) {
    const statusEl  = document.getElementById('status-text');
    const progressW = document.getElementById('progress-wrap');
    const progressB = document.getElementById('progress-bar');
    const detailEl  = document.getElementById('detail');
    const btnStop   = document.getElementById('btn-stop');
    const videoLink = document.getElementById('video-link');
    const setupForm = document.getElementById('setup-form');

    statusEl.className = 'status-text ' + s.status;

    const running = s.status === 'capturing' || s.status === 'building';
    setupForm.classList.toggle('hidden', running);
    btnStop.classList.toggle('hidden', !running);
    progressW.classList.toggle('hidden', s.status === 'idle' || s.status === 'error');
    detailEl.classList.toggle('hidden', s.status === 'idle');
    videoLink.classList.toggle('hidden', s.status !== 'done');

    if (s.status === 'idle') {
      statusEl.textContent = 'Idle';
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    } else if (s.status === 'capturing') {
      const pct = s.total > 0 ? (s.captured / s.total * 100) : 0;
      statusEl.textContent = 'Capturing…';
      progressB.classList.remove('pulse');
      progressB.style.width = pct + '%';
      detailEl.classList.remove('hidden');
      detailEl.textContent = `Frame ${s.captured} of ${s.total}`;

    } else if (s.status === 'building') {
      statusEl.textContent = 'Building video…';
      progressB.classList.add('pulse');
      progressB.style.width = '100%';
      detailEl.classList.remove('hidden');
      detailEl.textContent = s.message;

    } else if (s.status === 'done') {
      statusEl.textContent = 'Done — ' + s.video;
      detailEl.classList.remove('hidden');
      detailEl.textContent = 'Frames deleted. Video is ready.';
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }

    } else if (s.status === 'error') {
      statusEl.textContent = 'Error';
      detailEl.classList.remove('hidden');
      detailEl.textContent = s.message;
      if (pollTimer) { clearInterval(pollTimer); pollTimer = null; }
    }
  }

  // On load: check current status
  pollStatus();
  // If already running, start polling
  fetch('/timelapse/status').then(r => r.json()).then(s => {
    if (s.status === 'capturing' || s.status === 'building') startPolling();
  });
</script>
</body>
</html>
