<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PiCamera Suite</title>
  <style>
    :root { --bg:#121212; --card:#1e1e1e; --accent:#0066ff; --glow:#00aaff33; --text:#e0e0e0; --muted:#888; }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding:2rem;display:flex;align-items:center;justify-content:center;}
    .card{max-width:480px;width:100%;background:var(--card);border-radius:16px;padding:2rem;box-shadow:0 12px 40px var(--glow);}
    h1{font-size:2rem;font-weight:700;margin-bottom:.5rem;text-align:center;}
    .sub{color:var(--muted);text-align:center;margin-bottom:2rem;font-size:.9rem;}
    .btn{display:block;width:100%;padding:1rem;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:1.1rem;font-weight:600;cursor:pointer;text-align:center;text-decoration:none;margin:.5rem 0;transition:filter .15s;}
    .btn:hover{filter:brightness(1.15);}
    .btn.live{background:#28a745;}
    .foot{margin-top:2rem;font-size:.75rem;color:var(--muted);text-align:center;}
  </style>
</head>
<body>
  <div class="card">
    <h1>PiCamera Suite</h1>
    <p class="sub">Timelapse video &amp; live camera stream</p>
    <a class="btn" href="/video_page">Watch Timelapse</a>
    <a class="btn live" href="/livestream_page">Live Camera Stream</a>
    <div class="foot">Running on Raspberry Pi &bull; <span id="ts"></span></div>
  </div>
  <script>document.getElementById('ts').textContent = new Date().toLocaleString();</script>
</body>
</html>
